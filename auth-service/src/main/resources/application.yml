server:
  port: ${PORT:8083}
  servlet:
    contextPath: /auth
spring:
  application:
    name: auth-service

  profiles:
    active: ${PROFILE:default}

  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

  datasource:
    url: jdbc:postgresql://${DB_HOST:nozomi.proxy.rlwy.net}:${DB_PORT:31798}/${DB_NAME:auth-service-db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:KfexkDDpzpKZqQZokBSwASIoVLbVahrz}

  jpa:
    database: postgresql
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc.lob.non_contextual_creation: true

  cloud:
    config:
      enabled: ${CONFIG_ENABLED:false}

  flyway:
    validate-migration-naming: true
    baseline-on-migrate: true
    baseline-version: 0

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - user:email
              - read:user

jwt:
  secret: ${JWT_SECRET:w09u5390hqg[23whvur3qwg8o3b4q[8erhilwg3;fpiur3wq89u}
  expiration: 3600000  # 1 hour
  refresh-expiration: 86400000  # 24 hours